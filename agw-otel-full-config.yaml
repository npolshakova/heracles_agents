# yaml-language-server: $schema=https://agentgateway.dev/schema/config
# LLM failover (OpenAI → Ollama) with OTel tracing + OTLP access-log export.
# All chatdsg tool and provider calls go through this gateway.
frontendPolicies:
  tracing:
    host: localhost:4317
    randomSampling: true
  accessLog:
    otlp:
      host: localhost:4317
binds:
- port: 3000
  listeners:
  - name: llm-failover
    protocol: HTTP
    routes:
    - backends:
      - ai:
          groups:
          # Priority 0 – primary: OpenAI
          - providers:
            - name: openai
              provider:
                openAI:
                  model: gpt-4.1
          # Priority 1 – fallback: local Ollama
          - providers:
            - name: ollama
              hostOverride: "localhost:11434"
              pathOverride: /v1/responses
              provider:
                openAI:
                  model: llama3.1
        policies:
          health:
            unhealthyExpression: "response.code >= 500"
            eviction:
              duration: 30s
      policies:
        backendAuth:
          key: "${OPENAI_API_KEY}"
        ai:
          routes:
            "/v1/chat/completions": completions
            "/v1/responses": responses
            "*": passthrough
