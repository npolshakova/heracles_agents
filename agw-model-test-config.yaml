# agentgateway config for multi-model testing.
#
# Single port, header-based routing: the client sets x-model-provider
# to pick which backend handles the request.
#
# Required env vars (set whichever providers you want to test):
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY
#   Bedrock: uses standard AWS credentials (~/.aws/credentials)
#   Ollama:  ollama serve & ollama pull llama3.1
#
# Usage:
#   agentgateway -f agw-model-test-config.yaml
#   python agw-model-test.py
binds:
- port: 3000
  listeners:
  - name: multi-model
    protocol: HTTP
    routes:

    - name: openai-route
      matches:
      - path:
          pathPrefix: "/"
        headers:
        - name: "x-model-provider"
          value:
            exact: "openai"
      backends:
      - ai:
          name: openai
          provider:
            openAI: {}
      policies:
        backendAuth:
          key: "$OPENAI_API_KEY"
        ai:
          routes:
            "/v1/chat/completions": completions
            "*": passthrough

    - name: anthropic-route
      matches:
      - path:
          pathPrefix: "/"
        headers:
        - name: "x-model-provider"
          value:
            exact: "anthropic"
      backends:
      - ai:
          name: anthropic
          provider:
            anthropic: {}
      policies:
        backendAuth:
          key: "$ANTHROPIC_API_KEY"
        ai:
          routes:
            "/v1/chat/completions": completions
            "*": passthrough

    - name: bedrock-route
      matches:
      - path:
          pathPrefix: "/"
        headers:
        - name: "x-model-provider"
          value:
            exact: "bedrock"
      backends:
      - ai:
          name: bedrock
          provider:
            bedrock:
              region: us-east-1
      policies:
        ai:
          routes:
            "/v1/chat/completions": completions
            "*": passthrough

    - name: ollama-route
      matches:
      - path:
          pathPrefix: "/"
        headers:
        - name: "x-model-provider"
          value:
            exact: "ollama"
      backends:
      - ai:
          name: ollama
          hostOverride: "localhost:11434"
          provider:
            openAI:
              model: qwen2.5:14b
      policies:
        ai:
          routes:
            "/v1/chat/completions": completions
            "*": passthrough
