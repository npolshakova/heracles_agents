#
# agentgateway config demo scenarios:
#   Part 1  Multi-model evaluation   (header-based routing via x-model-provider)
#   Part 2  LLM failover             (default route: OpenAI → Ollama)
#   Part 3  Guardrails               (Google Model Armor prompt/response guards)
#   Part 4  OTel observability       (tracing + OTLP access-log export)
#
# Required env vars:
#   OPENAI_API_KEY                         — OpenAI backend auth
#   ANTHROPIC_API_KEY                      — Anthropic backend auth (Part 1)
#   Bedrock: uses standard AWS credentials — ~/.aws/credentials    (Part 1)
#   GEMINI_API_KEY                          — Gemini backend auth   (Part 1)
#   Ollama:  ollama serve & ollama pull    — local models          (Parts 1 & 2)
#
# OTel:
#   Tracing and access logs are sent to localhost:4317 (OTLP gRPC).
#   If no OTel Collector is running, the gateway still works — it just
#   won't export telemetry.
#
# Usage:
#   agentgateway -f config.yaml

frontendPolicies:
 tracing:
   host: localhost:4317
   protocol: grpc
   randomSampling: "1.0"
   attributes:
     environment: '"production"'
     route: request.path
   resources:
     service.name: '"agentgateway"'
 accessLog:
   otlp:
     host: localhost:4317

binds:
- port: 3000
  listeners:
  - name: unified
    protocol: HTTP
    routes:

    # ── Part 1: header-routed providers for multi-model evaluation ──

    - name: openai-route
      matches:
      - path:
          pathPrefix: "/"
        headers:
        - name: "x-model-provider"
          value:
            exact: "openai"
      backends:
      - ai:
          name: openai
          provider:
            openAI: {}
      policies:
        backendAuth:
          key: "$OPENAI_API_KEY"
        ai:
          routes:
            "/v1/chat/completions": completions
            "/v1/responses": responses
            "*": passthrough

    - name: anthropic-route
      matches:
      - path:
          pathPrefix: "/"
        headers:
        - name: "x-model-provider"
          value:
            exact: "anthropic"
      backends:
      - ai:
          name: anthropic
          provider:
            anthropic: {}
      policies:
        backendAuth:
          key: "$ANTHROPIC_API_KEY"
        ai:
          routes:
            "/v1/chat/completions": completions
            "/v1/responses": responses
            "*": passthrough

    - name: bedrock-route
      matches:
      - path:
          pathPrefix: "/"
        headers:
        - name: "x-model-provider"
          value:
            exact: "bedrock"
      backends:
      - ai:
          name: bedrock
          provider:
            bedrock:
              region: us-east-1
      policies:
        ai:
          routes:
            "/v1/chat/completions": completions
            "/v1/responses": responses
            "*": passthrough

    - name: gemini-route
      matches:
      - path:
          pathPrefix: "/"
        headers:
        - name: "x-model-provider"
          value:
            exact: "gemini"
      backends:
      - ai:
          name: gemini
          provider:
            gemini:
              model: gemini-2.5-pro
      policies:
        backendAuth:
          key: "$GEMINI_API_KEY"
        ai:
          routes:
            "/v1/chat/completions": completions
            "/v1/responses": responses
            "*": passthrough

    - name: ollama-route
      matches:
      - path:
          pathPrefix: "/"
        headers:
        - name: "x-model-provider"
          value:
            exact: "ollama"
      backends:
      - ai:
          name: ollama-direct
          hostOverride: "localhost:11434"
          provider:
            openAI:
              model: qwen3:32b # qwen2.5:14b
      policies:
        ai:
          routes:
            "/v1/chat/completions": completions
            "/v1/responses": responses
            "*": passthrough

    # ── Parts 2, 3 & 4: default failover route (no header match needed) ──
    # Requests without x-model-provider (e.g. chatdsg) land here.
    # OpenAI is tried first; on 5xx it is evicted for 30s and Ollama
    # takes over.
    #
    # Part 4 — Google Model Armor guardrails:
    #   Prompt and response guards screen content through Model Armor's
    #   granular content-safety filters before it reaches the LLM and
    #   before the response is returned to the user.

    - name: failover-default
      backends:
      - ai:
          groups:
          - providers:
            - name: openai
              provider:
                openAI:
                  model: gpt-4.1
          - providers:
            - name: ollama
              hostOverride: "localhost:11434"
              pathOverride: /v1/responses
              provider:
                openAI:
                  model: qwen2.5:14b # qwen3:32b # llama3.1
        policies:
          health:
            unhealthyExpression: "response.code >= 500"
            eviction:
              duration: 30s
              consecutiveFailures: 1

      policies:
        backendAuth:
          key: "${OPENAI_API_KEY}"
        ai:
          # ADD ME BACK FOR PART 4 — Google Model Armor guardrails! 
          promptGuard:
            # request:
            # - googleModelArmor:
            #     templateId: nina-test-agentgateway1 
            #     projectId: developers-369321
            #     location: us-central1
            #     policies:
            #       backendAuth:
            #         gcp: {}
            # response:
            # - googleModelArmor:
            #     templateId: nina-test-agentgateway1 
            #     projectId: developers-369321
            #     location: us-central1
            #     policies:
            #       backendAuth:
            #         gcp: {}
          routes:
            "/v1/chat/completions": completions
            "/v1/responses": responses
            "*": passthrough
