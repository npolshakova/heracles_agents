# yaml-language-server: $schema=https://agentgateway.dev/schema/config
# LLM failover with eviction: evict providers on 5xx so the next request tries the fallback group.
binds:
- port: 3000
  listeners:
  - name: llm-responses
    protocol: HTTP
    routes:
    - backends:
      - ai:
          groups:
          - providers:
            - name: llama3.1
              hostOverride: "localhost:11434"
              pathOverride: /v1/responses
              provider:
                openAI:
                  model: llama3.1
      policies:
        ai:
          routes:
            "/v1/chat/completions": completions
            "/v1/responses": responses
            "*": passthrough
