session_name: kubecon-demo-provider-evals
suppress_history: false

environment:
  HERACLES_OPENAI_API_KEY: "${OPENAI_API_KEY}"
  HERACLES_NEO4J_USERNAME: "neo4j"
  HERACLES_NEO4J_PASSWORD: "neo4j_pw"
  ADT4_HERACLES_IP: "localhost"
  ADT4_HERACLES_PORT: "7687"

options:
  default-command: /bin/zsh

windows:
  - window_name: main
    shell_command_before: |
      source ${ADT4_WS}/install/setup.zsh
      export HERACLES_AGENTS_PATH="$(git rev-parse --show-toplevel)"
      export AWS_PROFILE=AdministratorAccess-802411188784
      export AWS_REGION=us-east-1
      export AWS_DEFAULT_REGION=us-east-1
      eval "$(aws configure export-credentials --profile "$AWS_PROFILE" --format env 2>/dev/null)"
    layout: main-vertical
    options:
      main-pane-width: 80%
    panes:
      - focus: true
        shell_command:
          - source .venv/bin/activate && python3 agw-model-test.py --question-type qa --questions 0A
      - shell_command:
          - /Users/ninapolshakova/solo/agentgateway/target/debug/agentgateway -f config.yaml
      - shell_command:
          - ollama serve